<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Primary brand: #2c968d (HSL 175 55% 38%) */
  /* Bright variant:  #3dbdb3 (HSL 175 55% 48%) */

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #080c14;
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    position: relative;
  }

  /* Background gradient */
  .bg-gradient {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 80% at 75% 60%, rgba(12,30,46,0.85) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 20% 50%, rgba(44,150,141,0.10) 0%, transparent 60%),
      linear-gradient(135deg, #080c14 0%, #0b1720 50%, #080f1a 100%);
  }

  /* Top accent line — brand green */
  .top-line {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #2c968d 0%, #3dbdb3 45%, rgba(44,150,141,0.15) 100%);
  }

  /* Subtle grid lines */
  .grid-lines {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(44,150,141,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(44,150,141,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Left content */
  .content {
    position: absolute;
    left: 80px;
    top: 0;
    bottom: 0;
    width: 520px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* Icon */
  .icon-wrap {
    width: 76px;
    height: 76px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
  }

  .icon-wrap svg {
    width: 44px;
    height: 44px;
  }

  /* Title: LAP in white, MERINI in brand green */
  .title {
    font-size: 66px;
    font-weight: 800;
    letter-spacing: -1px;
    color: #ffffff;
    line-height: 1;
    margin-bottom: 10px;
  }

  .title .brand {
    color: #2c968d;
  }

  /* Korean subtitle */
  .subtitle-kr {
    font-size: 26px;
    font-weight: 500;
    color: rgba(255,255,255,0.40);
    letter-spacing: 0.5px;
    margin-bottom: 28px;
  }

  /* Divider */
  .divider {
    width: 48px;
    height: 2px;
    background: linear-gradient(90deg, #2c968d, transparent);
    margin-bottom: 24px;
  }

  /* Description */
  .desc {
    font-size: 20px;
    color: rgba(255,255,255,0.50);
    font-weight: 400;
    letter-spacing: 0.5px;
    line-height: 1.6;
  }

  /* Right chart area */
  .chart-area {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 560px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .chart-svg {
    width: 100%;
    height: 100%;
  }

  /* URL bottom right */
  .url {
    position: absolute;
    bottom: 36px;
    right: 56px;
    font-size: 15px;
    color: rgba(255,255,255,0.22);
    letter-spacing: 0.5px;
  }

  /* LIVE badge */
  .badge {
    position: absolute;
    bottom: 36px;
    left: 80px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(44,150,141,0.12);
    border: 1px solid rgba(44,150,141,0.35);
    border-radius: 20px;
    padding: 6px 14px;
  }

  .badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #2c968d;
  }

  .badge-text {
    font-size: 13px;
    color: #2c968d;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
</style>
</head>
