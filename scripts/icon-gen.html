<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 512px;
    height: 512px;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon {
    width: 512px;
    height: 512px;
    border-radius: 115px;
    background: linear-gradient(150deg, #0d1e30 0%, #0f2440 55%, #0a1825 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .icon::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 55% at 50% 55%, rgba(44,150,141,0.07) 0%, transparent 65%);
  }
  .icon svg {
    width: 360px;
    height: 360px;
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="icon">
    <!--
      M shape — 5 key points inside viewBox 0 0 400 400:
        A (70,  360)  bottom-left  [START]
        B (105,  50)  top-left     [GREEN up ↑]
        C (200, 248)  valley       [RED   down ↓]
        D (295,  50)  top-right    [GREEN up ↑]
        E (330, 360)  bottom-right [RED   down ↓]

      Arrowheads — notched polygon (back=52, wing=36, notch at 35%):

      AB: u=(0.108,-0.994), p=(0.994,0.108)
        tip B(105,50): base=(105-5.6,50+51.7)=(99.4,101.7)
        L=(99.4-35.8,101.7-3.9)=(63.6,97.8) R=(99.4+35.8,101.7+3.9)=(135.2,105.6)
        notch=(105+0.35*(99.4-105), 50+0.35*(101.7-50))=(102.9,68.1)
        ▲ "105,50 63,98 103,68 135,106"

      BC: u=(0.440,0.898), p=(-0.898,0.440)
        tip C(200,248): base=(200-22.9,248-46.7)=(177.1,201.3)
        L=(177.1+32.3,201.3-15.8)=(209.4,185.5) R=(177.1-32.3,201.3+15.8)=(144.8,217.1)
        notch=(200+0.35*(177.1-200), 248+0.35*(201.3-248))=(191.9,231.5)
        ▲ "200,248 209,186 192,232 145,217"

      CD: u=(0.440,-0.898), p=(0.898,0.440)
        tip D(295,50): base=(295-22.9,50+46.7)=(272.1,96.7)
        L=(272.1-32.3,96.7-15.8)=(239.8,80.9) R=(272.1+32.3,96.7+15.8)=(304.4,112.5)
        notch=(295+0.35*(272.1-295), 50+0.35*(96.7-50))=(287.1,66.3)
        ▲ "295,50 240,81 287,66 304,113"

      DE: u=(0.108,0.994), p=(-0.994,0.108)
        tip E(330,360): base=(330-5.6,360-51.7)=(324.4,308.3)
        L=(324.4+35.8,308.3-3.9)=(360.2,304.4) R=(324.4-35.8,308.3+3.9)=(288.6,312.2)
        notch=(330+0.35*(324.4-330), 360+0.35*(308.3-360))=(328.1,341.9)
        ▲ "330,360 360,304 328,342 289,312"
    -->
    <svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Glow-only filters (no SourceGraphic — pure halo) -->
        <filter id="haloG" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="11"/>
        </filter>
        <filter id="haloR" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="10"/>
        </filter>
        <!-- Tight glow for sharp layer -->
        <filter id="sharpG" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="3" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="sharpR" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="2.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- ── Render order: green lines → red lines → green arrowheads → red arrowheads ── -->
      <!-- Green arrowheads cover red lines at junction points B & D (clean peak) -->

      <!--
        Updated M points — A/E raised to y=305 to clear squircle corners:
          A (70, 305)   B (105, 50)   C (200, 248)   D (295, 50)   E (330, 305)

        AB: dx=35,dy=-255  |d|=257.4  u=(0.136,-0.991)  p=(0.991,0.136)
          tip B(105,50): base=(105-7.1,50+51.5)=(97.9,101.5)
          L=(97.9-35.7,101.5-4.9)=(62.2,96.6) R=(97.9+35.7,101.5+4.9)=(133.6,106.4)
          notch=(105+0.35*(97.9-105),50+0.35*(101.5-50))=(102.5,68.0)
          ▲ "105,50 62,97 103,68 134,106"

        DE: dx=35,dy=255  |d|=257.4  u=(0.136,0.991)  p=(-0.991,0.136)
          tip E(330,305): base=(330-7.1,305-51.5)=(322.9,253.5)
          L=(322.9+35.7,253.5-4.9)=(358.6,248.6) R=(322.9-35.7,253.5+4.9)=(287.2,258.4)
          notch=(330+0.35*(322.9-330),305+0.35*(253.5-305))=(327.5,287.0)
          ▲ "330,305 359,249 328,287 287,258"
      -->

      <!-- 1. Green line halos -->
      <g filter="url(#haloG)" opacity="0.70">
        <line x1="70" y1="305" x2="105" y2="50" stroke="#3dbdb3" stroke-width="20" stroke-linecap="round"/>
        <line x1="200" y1="248" x2="295" y2="50" stroke="#3dbdb3" stroke-width="20" stroke-linecap="round"/>
      </g>
      <!-- 2. Red line halos -->
      <g filter="url(#haloR)" opacity="0.70">
        <line x1="105" y1="50" x2="200" y2="248" stroke="#c07070" stroke-width="20" stroke-linecap="round"/>
        <line x1="295" y1="50" x2="330" y2="305" stroke="#c07070" stroke-width="20" stroke-linecap="round"/>
      </g>
      <!-- 3. Green arrowhead halos -->
      <g filter="url(#haloG)" opacity="0.70">
        <polygon points="105,50 62,97 103,68 134,106" fill="#3dbdb3"/>
        <polygon points="295,50 240,81 287,66 304,113" fill="#3dbdb3"/>
      </g>
      <!-- 4. Red arrowhead halos -->
      <g filter="url(#haloR)" opacity="0.70">
        <polygon points="200,248 209,186 192,232 145,217" fill="#c07070"/>
        <polygon points="330,305 359,249 328,287 287,258" fill="#c07070"/>
      </g>

      <!-- 5. Green lines (sharp) -->
      <g filter="url(#sharpG)">
        <line x1="70" y1="305" x2="105" y2="50"
              stroke="#2c968d" stroke-width="14" stroke-linecap="round"/>
        <line x1="200" y1="248" x2="295" y2="50"
              stroke="#2c968d" stroke-width="14" stroke-linecap="round"/>
      </g>
      <!-- 6. Red lines (sharp) -->
      <g filter="url(#sharpR)">
        <line x1="105" y1="50" x2="200" y2="248"
              stroke="#a05555" stroke-width="14" stroke-linecap="round"/>
        <line x1="295" y1="50" x2="330" y2="305"
              stroke="#a05555" stroke-width="14" stroke-linecap="round"/>
      </g>
      <!-- 7. Green arrowheads (sharp) — cover red lines at B & D -->
      <g filter="url(#sharpG)">
        <polygon points="105,50 62,97 103,68 134,106"
                 fill="#1d6b65" stroke="#2c968d" stroke-width="2.5" stroke-linejoin="round"/>
        <polygon points="295,50 240,81 287,66 304,113"
                 fill="#1d6b65" stroke="#2c968d" stroke-width="2.5" stroke-linejoin="round"/>
      </g>
      <!-- 8. Red arrowheads (sharp) — on top of everything -->
      <g filter="url(#sharpR)">
        <polygon points="200,248 209,186 192,232 145,217"
                 fill="#6e3535" stroke="#a05555" stroke-width="2.5" stroke-linejoin="round"/>
        <polygon points="330,305 359,249 328,287 287,258"
                 fill="#6e3535" stroke="#a05555" stroke-width="2.5" stroke-linejoin="round"/>
      </g>
    </svg>
  </div>
</body>
</html>
